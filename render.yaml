# render.yaml — Render Infrastructure as Code
# Docs: https://render.com/docs/yaml-spec
#
# Services defined here:
#   1. memento-backend  — Node.js web service (Express API)
#   2. memento-frontend — Static site (React + Vite)
#
# Database: provision separately in Render dashboard, then set DATABASE_URL
# on memento-backend (Environment tab). Use the Internal Database URL when
# the backend and DB are in the same region.

services:
  # ---------------------------------------------------------------------------
  # Backend — Node.js API
  # ---------------------------------------------------------------------------
  - type: web
    name: memento-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render — do not set it here.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://memento-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://memento-frontend.onrender.com
      - key: GOOGLE_CALLBACK_URL
        value: https://memento-backend.onrender.com/api/v1/auth/google/callback
      - key: GOOGLE_GMAIL_CALLBACK_URL
        value: https://memento-backend.onrender.com/api/v1/gmail/callback
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Set these manually in the Render dashboard (Environment tab).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ---------------------------------------------------------------------------
  # Frontend — React static site
  # ---------------------------------------------------------------------------
  - type: static
    name: memento-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://memento-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
